name: Publish systemd executor to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: Build and publish systemd executor package
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/bytegrader-executor-systemd

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: executors/systemd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build hatchling

      - name: Build wheel and source distribution
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: executors/systemd/dist/
          skip-existing: true